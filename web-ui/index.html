<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Camera Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <h1>Traffic Camera Monitoring System</h1>

        <div id="system-info" class="system-info hidden">
            <span id="display-user">User: admin</span>
            <span>System Status: <span class="status-running">Running</span></span>
        </div>
    </header>

    <div class="container">
        <div id="login-section" class="card">
            <h2>System Login</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button id="login-btn" class="btn btn-primary">Login</button>
            <div class="login-links">
                <a href="#" id="show-register-link" class="login-link">Register</a>
                <a href="#" id="show-forgot-link" class="login-link">Forgot Password?</a>
            </div>
        </div>

        <div class="modal-overlay hidden" id="modal-overlay"></div>

        <div id="register-section" class="modal-card hidden">
            <button class="modal-close" id="reg-close">&times;</button>
            <h2>Create Account</h2>
            <div id="register-message"
                style="display: none; font-size: 13px; font-weight: 500; text-align: center; margin-bottom: 16px;">
            </div>
            <div class="input-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Create a password">
            </div>
            <div class="input-group">
                <label for="reg-confirm">Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Confirm your password">
            </div>
            <button id="register-submit-btn" class="btn btn-primary">Create Account</button>
        </div>

        <div id="forgot-password-section" class="modal-card hidden">
            <button class="modal-close" id="forgot-close">&times;</button>
            <h2>Reset Password</h2>
            <div id="forgot-message"
                style="display: none; font-size: 13px; font-weight: 500; text-align: center; margin-bottom: 16px;">
            </div>
            <div class="input-group">
                <label for="forgot-input">Email or Username</label>
                <input type="text" id="forgot-input" placeholder="Enter account email or username">
            </div>
            <button id="forgot-submit-btn" class="btn btn-primary">Reset Password</button>
        </div>

        <div id="monitoring-section" class="dashboard-layout hidden">

            <div class="dashboard-card">
                <div class="video-placeholder">
                    <div id="camera-status" class="status-indicator offline">
                        <span class="dot"></span>
                        <span class="status-text">Camera Offline</span>
                    </div>
                </div>

                <div class="controls">
                    <button id="start-btn" class="btn btn-primary">Start Monitoring</button>
                    <button id="stop-btn" class="btn btn-secondary" disabled>Stop Monitoring</button>
                    <button id="snapshot-btn" class="btn btn-secondary" disabled>Get Snapshot</button>
                </div>
            </div>

            <div id="snapshot-preview-container" class="dashboard-card output-area hidden">
                <div class="output-header">Snapshot Preview</div>
                <div class="snapshot-box-wrapper" style="padding: 24px;">
                    <div id="snapshot-box" class="snapshot-box">
                        <span id="snapshot-status-text">Waiting for snapshot...</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-card output-area">
                <div class="output-header">System Logs</div>
                <div id="console-logs" class="logs-container">
                    <div class="log-entry system">System initialized. Waiting for login...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
